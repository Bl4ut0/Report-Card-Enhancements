version: '3.8'

services:
  app:
    build: .
    restart: always
    environment:
      - PORT=3000
      - WCL_PROXY_SECRET=${WCL_PROXY_SECRET}
      - DISCORD_PROXY_SECRET=${DISCORD_PROXY_SECRET}
      - WCL_PROXY_MAX_RETRIES=${WCL_PROXY_MAX_RETRIES:-2}
      - WCL_PROXY_MAX_BACKOFF_MS=${WCL_PROXY_MAX_BACKOFF_MS:-15000}
      - WCL_PROXY_CACHE_TTL_SECONDS=${WCL_PROXY_CACHE_TTL_SECONDS:-300}
      - WCL_PROXY_STALE_TTL_SECONDS=${WCL_PROXY_STALE_TTL_SECONDS:-86400}
    networks:
      - proxy-net

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - proxy-net

volumes:
  caddy_data:
  caddy_config:

networks:
  proxy-net:
    driver: bridge
